name: Terraform + GitHub Repo

on:
  workflow_dispatch:

permissions:
  id-token: write      # Needed for OIDC
  contents: read       # Needed to checkout repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Authenticate to GCP using OIDC
      - name: Authenticate to GCP via OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/853245610917/locations/global/workloadIdentityPools/github/providers/github"
          service_account: "terraform-sa@new-7d564.iam.gserviceaccount.com"

      # Setup Terraform
      - uses: hashicorp/setup-terraform@v3

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # Apply Terraform (create bucket)
      - name: Terraform Apply
        run: terraform apply -auto-approve \
             -var="project_id=new-7d564" \
             -var="bucket_name=oidc-test-bucket-123"

      # Create GitHub repository
      - name: Create GitHub Repository
        uses: peter-evans/create-or-update-repo@v4
        with:
          token: ${{ secrets.GH_PAT }}
          name: oidc-test-repo
          description: "Repo created automatically after Terraform"
          private: true
