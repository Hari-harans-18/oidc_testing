name: GCP OIDC Login Test

on:
  workflow_dispatch:

permissions:
  id-token: write  # Required to request OIDC token
  contents: read

jobs:
  login-test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code (optional)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Authenticate to GCP via OIDC
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/853245610917/locations/global/workloadIdentityPools/githubaction/providers/github-action
          service_account: terraform-sa@new-7d564.iam.gserviceaccount.com
          token_audience: https://iam.googleapis.com/projects/853245610917/locations/global/workloadIdentityPools/githubaction/providers/github-action

      # Step 3: Verify login
      - name: Verify GCP authentication
        run: |
          gcloud auth list
          gcloud config list
